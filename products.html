<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>المتجر الإلكتروني - المنتجات</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111827;
    }

    header {
      background: #111827;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-weight: 700;
      font-size: 1.2rem;
    }

    nav a {
      color: #e5e7eb;
      text-decoration: none;
      margin-left: 1rem;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .cart-indicator {
      background: #f97316;
      color: #111827;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-right: 0.5rem;
    }

    main {
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.6rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 1.5rem;
    }

    .product {
      background: #ffffff;
      border-radius: 0.75rem;
      padding: 1rem;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product img {
      width: 100%;
      border-radius: 0.5rem;
      margin-bottom: 0.75rem;
      object-fit: cover;
      height: 180px;
      background: #e5e7eb;
    }

    .product h3 {
      margin: 0 0 0.25rem;
      font-size: 1.05rem;
    }

    .product p {
      margin: 0 0 0.5rem;
      font-size: 0.9rem;
      color: #4b5563;
    }

    .product .price {
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .product .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-top: auto;
    }

    .product button,
    .product a {
      flex: 1;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 0.6rem 0.8rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
    }

    .btn-add {
      background: #f97316;
      color: #111827;
    }

    .btn-add:hover {
      background: #fb923c;
    }

    .btn-details {
      background: #111827;
      color: #f9fafb;
    }

    .btn-details:hover {
      background: #020617;
    }

    footer {
      margin-top: 3rem;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      nav a {
        margin-left: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">متجر O الإلكتروني</div>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="cart.html">
        <span class="cart-indicator" id="cartCount">0</span>
        السلة
      </a>
    </nav>
  </header>

  <main>
    <h1>المنتجات</h1>
    <section class="products-grid" id="productsGrid">
      <!-- المنتجات تُحقن من JavaScript -->
    </section>
  </main>

  <footer>
    &copy; <span id="year"></span> متجر O الإلكتروني
  </footer>

  <script>
    const products = [
      {
        id: 1,
        name: "سماعات لاسلكية",
        description: "سماعات بجودة عالية وعزل ضوضاء.",
        price: 199,
        image: "",
      },
      {
        id: 2,
        name: "ساعة ذكية",
        description: "ساعة ذكية لمتابعة نشاطك اليومي.",
        price: 349,
        image: "",
      },
      {
        id: 3,
        name: "كيبورد ميكانيكي",
        description: "كيبورد بإضاءة RGB وتجربة كتابة مميزة.",
        price: 299,
        image: "",
      },
      {
        id: 4,
        name: "ماوس ألعاب",
        description: "ماوس بدقة عالية مخصص للألعاب.",
        price: 149,
        image: "",
      },
    ];

    function renderProducts() {
      const grid = document.getElementById("productsGrid");
      grid.innerHTML = "";

      products.forEach((product) => {
        const card = document.createElement("article");
        card.className = "product";

        card.innerHTML = `
          <img src="${product.image || "https://via.placeholder.com/400x250?text=Product"}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <div class="price">${product.price} ر.س</div>
          <div class="actions">
            <button class="btn-add" data-id="${product.id}">إضافة للسلة</button>
            <a class="btn-details" href="product.html?id=${product.id}">تفاصيل</a>
          </div>
        `;

        grid.appendChild(card);
      });

      document.querySelectorAll(".btn-add").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = parseInt(btn.getAttribute("data-id"), 10);
          addToCart(id);
        });
      });
    }

    function addToCart(productId) {
      const product = products.find((p) => p.id === productId);
      if (!product) return;

      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      cart.push(product);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartCount();
      alert("تمت إضافة المنتج إلى السلة");
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      document.getElementById("cartCount").textContent = cart.length;
    }

    document.getElementById("year").textContent = new Date().getFullYear();
    renderProducts();
    updateCartCount();
  </script>
</body>
</html>
