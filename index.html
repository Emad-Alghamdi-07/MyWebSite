<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجري الصغير</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>متجري الإلكتروني</h1>
    </header>

    <main>
        <section id="products-list">
            <h2>المنتجات</h2>
            <div class="products-grid">
                <div class="product-card">
                    <h3>سماعات لاسلكية</h3>
                    <p>السعر: 150 ريال</p>
                    <button onclick="addToCart('سماعات لاسلكية', 150)">إضافة للسلة</button>
                </div>
                <div class="product-card">
                    <h3>ساعة ذكية</h3>
                    <p>السعر: 300 ريال</p>
                    <button onclick="addToCart('ساعة ذكية', 300)">إضافة للسلة</button>
                </div>
            </div>
        </section>

        <section id="cart-section">
            <h2>سلة المشتريات</h2>
            <ul id="cart-items">
                </ul>
            <p>الإجمالي: <span id="total-price">0</span> ريال</p>
            <button id="checkout-btn" onclick="checkout()">إتمام الشراء</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
