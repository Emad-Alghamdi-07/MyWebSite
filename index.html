<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المحتوى الحر</title>
    <style>
        /* تصميم بسيط وأنيق يشبه ثريدز */
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1DB954; text-align: center; }

        /* صندوق الكتابة */
        .post-box { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: transparent; color: #fff; border: none; outline: none; resize: none; font-size: 16px; }
        button { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; float: left; }
        button:hover { background: #ddd; }

        /* قائمة المنشورات */
        .feed { width: 100%; }
        .post { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; animation: slideIn 0.3s ease; }
        .post-time { font-size: 12px; color: #666; margin-bottom: 8px; }
        .post-content { font-size: 16px; line-height: 1.4; word-wrap: break-word; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>فضفض للبشر 🚀</h1>

        <div class="post-box">
            <textarea id="postInput" placeholder="وش قاعد يدور في بالك؟"></textarea>
            <button onclick="sendPost()">نشر</button>
            <div style="clear: both;"></div>
        </div>

        <div id="feed" class="feed">
            <p style="text-align: center; color: #666;">جاري تحميل المحتوى العشوائي...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // الروابط اللي أنت نسختها ركبتها لك هنا
        const SUPABASE_URL = 'https://yiwgqohertsftgnpcqoh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. وظيفة لجلب المنشورات من القاعدة وعرضها
        async function getPosts() {
            const { data, error } = await _supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('خطأ في التحميل:', error);
                return;
            }

            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = ''; // تنظيف الشاشة قبل العرض

            data.forEach(post => {
                const postElement = document.createElement('div');
                postElement.className = 'post';
                postElement.innerHTML = `
                    <div class="post-time">${new Date(post.created_at).toLocaleString('ar-SA')}</div>
                    <div class="post-content">${post.content}</div>
                `;
                feedDiv.appendChild(postElement);
            });
        }

        // 2. وظيفة لنشر كلام جديد
        async function sendPost() {
            const content = document.getElementById('postInput').value;

            if (!content.trim()) {
                alert("اكتب شي أول!");
                return;
            }

            const { error } = await _supabase
                .from('posts')
                .insert([{ content: content }]);

            if (error) {
                alert("مشكلة في النشر، تأكد من إعدادات الجدول");
                console.error(error);
            } else {
                document.getElementById('postInput').value = ''; // مسح الصندوق
                getPosts(); // تحديث القائمة فوراً
            }
        }

        // تشغيل الجلب بمجرد فتح الصفحة
        getPosts();
    </script>
</body>
</html>
