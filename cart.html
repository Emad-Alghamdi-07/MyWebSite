<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>المتجر الإلكتروني - السلة</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111827;
    }

    header {
      background: #111827;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-weight: 700;
      font-size: 1.2rem;
    }

    nav a {
      color: #e5e7eb;
      text-decoration: none;
      margin-left: 1rem;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .cart-indicator {
      background: #f97316;
      color: #111827;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-right: 0.5rem;
    }

    main {
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.6rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    th, td {
      padding: 0.9rem 0.75rem;
      font-size: 0.9rem;
      text-align: right;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #f3f4f6;
      font-weight: 600;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .empty {
      background: #ffffff;
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      font-size: 0.95rem;
    }

    .total {
      margin-top: 1rem;
      text-align: left;
      font-weight: 700;
      font-size: 1rem;
    }

    .actions {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .actions button,
    .actions a {
      border: none;
      outline: none;
      cursor: pointer;
      padding: 0.7rem 1.2rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
    }

    .btn-clear {
      background: #ef4444;
      color: #f9fafb;
    }

    .btn-clear:hover {
      background: #dc2626;
    }

    .btn-continue {
      background: #111827;
      color: #f9fafb;
    }

    .btn-continue:hover {
      background: #020617;
    }

    .btn-checkout {
      background: #22c55e;
      color: #022c22;
    }

    .btn-checkout:hover {
      background: #16a34a;
    }

    .remove-btn {
      border: none;
      background: transparent;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .remove-btn:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 3rem;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      nav a {
        margin-left: 0.5rem;
      }

      th, td {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">متجر O الإلكتروني</div>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="cart.html">
        <span class="cart-indicator" id="cartCount">0</span>
        السلة
      </a>
    </nav>
  </header>

  <main>
    <h1>سلة المشتريات</h1>
    <section id="cartSection">
      <!-- محتوى السلة يُحقن من JavaScript -->
    </section>
  </main>

  <footer>
    &copy; <span id="year"></span> متجر O الإلكتروني
  </footer>

  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const section = document.getElementById("cartSection");

      if (cart.length === 0) {
        section.innerHTML = '<div class="empty">السلة فارغة حالياً. ابدأ بإضافة المنتجات من صفحة <a href="products.html">المنتجات</a>.</div>';
        updateCartCount();
        return;
      }

      let rows = "";
      let total = 0;

      cart.forEach((item, index) => {
        total += item.price;
        rows += `
          <tr>
            <td>${item.name}</td>
            <td>${item.price} ر.س</td>
            <td>
              <button class="remove-btn" data-index="${index}">إزالة</button>
            </td>
          </tr>
        `;
      });

      section.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>المنتج</th>
              <th>السعر</th>
              <th>إجراء</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
        <div class="total">الإجمالي: ${total} ر.س</div>
        <div class="actions">
          <a href="products.html" class="btn-continue">متابعة التسوق</a>
          <button class="btn-clear" id="clearCartBtn">تفريغ السلة</button>
          <button class="btn-checkout" id="checkoutBtn">إتمام الطلب (وهمي)</button>
        </div>
      `;

      document.querySelectorAll(".remove-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = parseInt(btn.getAttribute("data-index"), 10);
          removeItem(index);
        });
      });

      document.getElementById("clearCartBtn").addEventListener("click", clearCart);
      document.getElementById("checkoutBtn").addEventListener("click", checkout);

      updateCartCount();
    }

    function removeItem(index) {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    function clearCart() {
      if (!confirm("هل أنت متأكد من تفريغ السلة؟")) return;
      localStorage.removeItem("cart");
      loadCart();
    }

    function checkout() {
      alert("هذه عملية دفع تجريبية فقط (وهمية). يمكنك لاحقاً ربطها ببوابة دفع حقيقية.");
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      document.getElementById("cartCount").textContent = cart.length;
    }

    document.getElementById("year").textContent = new Date().getFullYear();
    loadCart();
  </script>
</body>
</html>
