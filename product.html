<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>المتجر الإلكتروني - تفاصيل المنتج</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111827;
    }

    header {
      background: #111827;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-weight: 700;
      font-size: 1.2rem;
    }

    nav a {
      color: #e5e7eb;
      text-decoration: none;
      margin-left: 1rem;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .cart-indicator {
      background: #f97316;
      color: #111827;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-right: 0.5rem;
    }

    main {
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .product-wrapper {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 2rem;
      background: #ffffff;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .product-wrapper img {
      width: 100%;
      border-radius: 0.75rem;
      object-fit: cover;
      background: #e5e7eb;
      max-height: 350px;
    }

    .product-info h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.6rem;
    }

    .product-info p {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      color: #4b5563;
    }

    .product-info .price {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .product-info button {
      border: none;
      outline: none;
      cursor: pointer;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      background: #f97316;
      color: #111827;
    }

    .product-info button:hover {
      background: #fb923c;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      text-decoration: none;
      color: #111827;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 3rem;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
    }

    @media (max-width: 800px) {
      .product-wrapper {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      nav a {
        margin-left: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">متجر O الإلكتروني</div>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="cart.html">
        <span class="cart-indicator" id="cartCount">0</span>
        السلة
      </a>
    </nav>
  </header>

  <main>
    <section class="product-wrapper" id="productWrapper">
      <!-- تفاصيل المنتج تُحقن من JavaScript -->
    </section>

    <a href="products.html" class="back-link">العودة إلى قائمة المنتجات</a>
  </main>

  <footer>
    &copy; <span id="year"></span> متجر O الإلكتروني
  </footer>

  <script>
    const products = [
      {
        id: 1,
        name: "سماعات لاسلكية",
        description: "سماعات بجودة عالية وعزل ضوضاء، بطارية تدوم حتى 24 ساعة.",
        price: 199,
        image: "",
      },
      {
        id: 2,
        name: "ساعة ذكية",
        description: "ساعة ذكية لمتابعة نشاطك اليومي مع إشعارات الهاتف.",
        price: 349,
        image: "",
      },
      {
        id: 3,
        name: "كيبورد ميكانيكي",
        description: "كيبورد ميكانيكي بإضاءة RGB ومفاتيح مريحة للكتابة والألعاب.",
        price: 299,
        image: "",
      },
      {
        id: 4,
        name: "ماوس ألعاب",
        description: "ماوس بدقة عالية مع أزرار قابلة للبرمجة.",
        price: 149,
        image: "",
      },
    ];

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function renderProduct() {
      const id = parseInt(getQueryParam("id"), 10);
      const product = products.find((p) => p.id === id);

      const wrapper = document.getElementById("productWrapper");

      if (!product) {
        wrapper.innerHTML = "<p>المنتج غير موجود.</p>";
        return;
      }

      wrapper.innerHTML = `
        <div>
          <img src="${product.image || "https://via.placeholder.com/500x350?text=Product"}" alt="${product.name}">
        </div>
        <div class="product-info">
          <h1>${product.name}</h1>
          <p>${product.description}</p>
          <div class="price">${product.price} ر.س</div>
          <button id="addToCartBtn">إضافة إلى السلة</button>
        </div>
      `;

      document.getElementById("addToCartBtn").addEventListener("click", () => {
        addToCart(product.id);
      });
    }

    function addToCart(productId) {
      const product = products.find((p) => p.id === productId);
      if (!product) return;

      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      cart.push(product);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartCount();
      alert("تمت إضافة المنتج إلى السلة");
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      document.getElementById("cartCount").textContent = cart.length;
    }

    document.getElementById("year").textContent = new Date().getFullYear();
    renderProduct();
    updateCartCount();
  </script>
</body>
</html>
