<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعليقات نيون</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #0f0;
        font-family: 'Segoe UI', sans-serif;
    }

    /* زر + */
    .add-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 55px;
        height: 55px;
        background: #0f0;
        color: #000;
        border-radius: 50%;
        font-size: 32px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 0 15px #0f0;
        transition: 0.2s;
        z-index: 10;
    }

    .add-btn:hover {
        background: #8f8;
    }

    /* صندوق الكتابة */
    .input-box {
        position: fixed;
        bottom: 90px;
        left: 20px;
        right: 20px;
        background: #050505;
        border: 1px solid #0f0;
        padding: 15px;
        border-radius: 12px;
        display: none;
        box-shadow: 0 0 15px #0f0;
    }

    textarea {
        width: 100%;
        height: 70px;
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        color: #0f0;
        font-size: 16px;
    }

    .counter {
        font-size: 12px;
        color: #8f8;
        margin-top: 5px;
        text-align: left;
    }

    button {
        margin-top: 10px;
        background: #0f0;
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #8f8;
    }

    /* التعليقات */
    .feed {
        padding: 20px;
        margin-bottom: 120px;
    }

    .post {
        background: #050505;
        border: 1px solid #0f0;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        animation: fadeIn 0.3s ease;
    }

    .post-time {
        font-size: 12px;
        color: #7f7;
        margin-bottom: 8px;
    }

    .post-content {
        font-size: 17px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="feed" id="feed">
    <p style="text-align:center; color:#555;">جاري تحميل التعليقات...</p>
</div>

<!-- صندوق الكتابة -->
<div class="input-box" id="inputBox">
    <textarea id="postInput" maxlength="60" placeholder="اكتب تعليقك (حد 60 حرف)"></textarea>
    <div class="counter" id="counter">0 / 60</div>
    <button onclick="sendPost()">نشر</button>
</div>

<!-- زر + -->
<div class="add-btn" onclick="toggleInput()">+</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* Supabase */
const SUPABASE_URL = "https://yiwgqohertsftgnpcqoh.supabase.co";
const SUPABASE_KEY = "sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
_supabase
  .channel('public:posts')
  .on(
    'postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'posts' },
    (payload) => {
        getPosts(); // تحديث تلقائي عند إضافة تعليق جديد
    }
  )
  .subscribe();


/* فتح/إغلاق صندوق الكتابة */
function toggleInput() {
    const box = document.getElementById("inputBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* عداد الحروف */
document.getElementById("postInput").addEventListener("input", () => {
    const len = document.getElementById("postInput").value.length;
    document.getElementById("counter").textContent = `${len} / 60`;
});

/* نشر تعليق */
async function sendPost() {
    const content = document.getElementById("postInput").value.trim();

    if (!content) {
        alert("اكتب تعليق أول");
        return;
    }

    const { error } = await _supabase.from("posts").insert([{ content }]);

    if (error) {
        alert("خطأ في النشر");
        console.error(error);
    } else {
        document.getElementById("postInput").value = "";
        document.getElementById("counter").textContent = "0 / 60";
        toggleInput();
        getPosts();
    }
}

/* جلب التعليقات */
async function getPosts() {
    const { data, error } = await _supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) return console.error(error);

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.forEach(post => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <div class="post-time">${new Date(post.created_at).toLocaleString("ar-SA")}</div>
            <div class="post-content">${post.content}</div>
        `;

        feed.appendChild(div);
    });
}

getPosts();
</script>

</body>
</html>
