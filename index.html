<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نـجـد | Najd</title>

<!-- Google Font: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        color: #fff;
        font-family: 'Inter', sans-serif;
    }

    header {
        padding: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: 600;
        border-bottom: 1px solid #222;
    }

    .container {
        max-width: 700px;
        margin: 20px auto;
        padding: 0 15px;
    }

    textarea {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 12px;
        border-radius: 8px;
        color: #fff;
        resize: none;
        font-size: 16px;
        height: 90px;
    }

    button {
        margin-top: 10px;
        width: 100%;
        padding: 12px;
        background: #4a8cff;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        font-weight: 600;
    }

    button:hover {
        background: #3b6fd6;
    }

    .post {
        display: flex;
        gap: 12px;
        padding: 15px 0;
        border-bottom: 1px solid #222;
    }

    .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .content {
        flex: 1;
        font-size: 16px;
        line-height: 1.5;
        word-break: break-word;
    }

    .time {
        font-size: 12px;
        color: #aaa;
        margin-top: 6px;
    }
</style>
</head>

<body>

<header>نـجـد | Najd</header>

<div class="container">
    <textarea id="postInput" placeholder="اكتب منشورك..."></textarea>
    <button onclick="addPost()">نشر</button>

    <div id="posts"></div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = "https://yiwgqohertsftgnpcqoh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // كل مستخدم يحصل على لون ثابت
    let userColor = localStorage.getItem("najd_user_color");
    if (!userColor) {
        userColor = "#" + Math.floor(Math.random() * 16777215).toString(16);
        localStorage.setItem("najd_user_color", userColor);
    }

    // إضافة منشور
    async function addPost() {
        const content = document.getElementById("postInput").value.trim();
        if (!content) return;

        await supabaseClient.from("posts").insert([{ content }]);
        document.getElementById("postInput").value = "";
        loadPosts();
    }

    // حذف المنشورات الأقدم من 24 ساعة
    async function cleanupOldPosts() {
        const cutoff = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        await supabaseClient.from("posts").delete().lt("created_at", cutoff);
    }

    // جلب المنشورات
    async function loadPosts() {
        await cleanupOldPosts();

        const { data } = await supabaseClient
            .from("posts")
            .select("*")
            .order("created_at", { ascending: true });

        const postsDiv = document.getElementById("posts");
        postsDiv.innerHTML = "";

        data.forEach(post => {
            const postEl = document.createElement("div");
            postEl.className = "post";

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.style.background = userColor;

            const content = document.createElement("div");
            content.className = "content";
            content.innerText = post.content;

            const time = document.createElement("div");
            time.className = "time";
            time.innerText = new Date(post.created_at).toLocaleString("ar-SA");

            const wrapper = document.createElement("div");
            wrapper.appendChild(content);
            wrapper.appendChild(time);

            postEl.appendChild(avatar);
            postEl.appendChild(wrapper);

            postsDiv.appendChild(postEl);
        });
    }

    loadPosts();
</script>

</body>
</html>
