
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najd | نـجـد</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo+Play:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

/* 🌙 الوضع الداكن (افتراضي) */
body {
    font-family: "Cairo Play", sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    transition: 0.3s;
}

/* ☀️ الوضع الفاتح */
body.light {
    background: #f5f5f5;
    color: #000;
}

/* --- تعديل الهيدر ليصبح ثابتاً --- */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    font-size: 24px;
    border-bottom: 2px solid #474747;
    
    /* التثبيت في الأعلى */
    position: sticky;
    top: 0;
    z-index: 1000; /* لضمان ظهوره فوق المنشورات */
    background: #000; /* خلفية سوداء للوضع الداكن */
}

/* تغيير خلفية الهيدر عند تفعيل الوضع الفاتح */
body.light header {
    background: #f5f5f5;
}

.settings-btn {
    font-size: 22px;
    cursor: pointer;
}

.container {
    max-width: 550px;
    margin: auto;
    padding: 20px;
}

.post {
    background: #111;
    border: 1px solid #222;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

body.light .post {
    background: #fff;
    border: 1px solid #ddd;
}

.post-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.username { font-weight: bold; }

.post-time {
    font-size: 12px;
    color: #888;
}

.post-content { margin-top: 8px; }

.delete-btn {
    margin-top: 10px;
    background: #ff4d4d;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

.fab {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1DB954;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 30px;
    border: none;
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* مودال عام */
.modal {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: #000000cc;
    display: none;
    justify-content: center;
    align-items: flex-end;
    z-index: 2000;
}

.modal-box {
    width: 100%;
    max-width: 550px;
    background: #111;
    padding: 20px;
    border-radius: 20px 20px 0 0;
}

body.light .modal-box {
    background: #fff;
}

textarea, input, select {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #222;
    color: white;
}

body.light textarea, body.light input, body.light select {
    background: #eee;
    color: black;
    border: 1px solid #ccc;
}

.send-btn {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    background: #1DB954;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <span>Najd | نـجـد</span>
    <span class="settings-btn" onclick="openSettings()">⚙️</span>
</header>

<div class="container">
    <div id="feed"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal" onclick="if(event.target == this) this.style.display='none'">
    <div class="modal-box">
        <textarea id="postInput" placeholder="اكتب ما يدور بذهنك..."></textarea>
        <button class="send-btn" onclick="sendPost()">!نشر</button>
    </div>
</div>

<div class="modal" id="settingsModal" onclick="if(event.target == this) this.style.display='none'">
    <div class="modal-box">
        <h3>الإعدادات</h3>
        <input id="nameInput" placeholder="User Name">
        <input type="color" id="colorInput" style="height: 50px;">
        <select id="themeSelect">
            <option value="dark">داكن</option>
            <option value="light">فاتح</option>
        </select>
        <button class="send-btn" onclick="saveSettings()">حفظ</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://yiwgqohertsftgnpcqoh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* بيانات المستخدم */
let username = localStorage.getItem("username") || "مستخدم";
let userColor = localStorage.getItem("userColor") || "#4da6ff";
let theme = localStorage.getItem("theme") || "dark";

/* تطبيق الثيم عند التحميل */
if (theme === "light") document.body.classList.add("light");

/* تخزين معرفات منشوراتي للحذف */
let myPosts = JSON.parse(localStorage.getItem("myPosts") || "[]");

/* فتح المودال */
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function openSettings() {
    document.getElementById("settingsModal").style.display = "flex";
    document.getElementById("nameInput").value = username;
    document.getElementById("colorInput").value = userColor;
    document.getElementById("themeSelect").value = theme;
}

/* حفظ الإعدادات */
function saveSettings() {
    username = document.getElementById("nameInput").value || "مستخدم";
    userColor = document.getElementById("colorInput").value;
    theme = document.getElementById("themeSelect").value;

    localStorage.setItem("username", username);
    localStorage.setItem("userColor", userColor);
    localStorage.setItem("theme", theme);

    if (theme === "light") {
        document.body.classList.add("light");
    } else {
        document.body.classList.remove("light");
    }

    document.getElementById("settingsModal").style.display = "none";
    getPosts(); // إعادة التحميل لتحديث الألوان
}

/* حساب الوقت */
function timeAgo(date) {
    const seconds = Math.floor((Date.now() - new Date(date)) / 1000);
    if (seconds < 60) return "الآن";
    const mins = Math.floor(seconds/60);
    if (mins < 60) return `قبل ${mins} دقيقة`;
    const hours = Math.floor(mins/60);
    if (hours < 24) return `قبل ${hours} ساعة`;
    return new Date(date).toLocaleDateString('ar-EG');
}

/* جلب المنشورات */
async function getPosts() {
    const { data, error } = await _supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) return console.error(error);

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.forEach(post => {
        const el = document.createElement("div");
        el.className = "post";

        el.innerHTML = `
            <div class="post-header">
                <div class="avatar" style="background:${post.color || '#4da6ff'}"></div>
                <div>
                    <div class="username">${post.author}</div>
                    <div class="post-time">${timeAgo(post.created_at)}</div>
                </div>
            </div>

            <div class="post-content">${post.content}</div>

            ${myPosts.includes(post.id) ? `<button class="delete-btn" onclick="deletePost('${post.id}')">حذف</button>` : ""}
        `;

        feed.appendChild(el);
    });
}

/* نشر منشور جديد */
async function sendPost() {
    const content = document.getElementById("postInput").value;
    if (!content.trim()) return;

    const { data, error } = await _supabase
        .from('posts')
        .insert([{ content, author: username, color: userColor }])
        .select();

    if (error) return alert("حدث خطأ أثناء النشر");

    myPosts.push(data[0].id);
    localStorage.setItem("myPosts", JSON.stringify(myPosts));

    document.getElementById("postInput").value = "";
    document.getElementById("modal").style.display = "none";
    getPosts();
}

/* حذف منشور */
async function deletePost(id) {
    if(!confirm("هل أنت متأكد من حذف هذا المنشور؟")) return;
    
    await _supabase.from('posts').delete().eq('id', id);

    myPosts = myPosts.filter(p => p !== id);
    localStorage.setItem("myPosts", JSON.stringify(myPosts));

    getPosts();
}

// تشغيل الجلب عند فتح الصفحة
getPosts();
</script>

</body>
</html>
