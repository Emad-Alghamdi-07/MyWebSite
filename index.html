<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najd Threads</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
    }

    .container {
        max-width: 600px;
        margin: auto;
        padding: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
    }

    .input-box {
        background: #111;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid #222;
    }

    input, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border-radius: 10px;
        border: none;
        background: #1a1a1a;
        color: #fff;
        font-size: 15px;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        margin-top: 10px;
        cursor: pointer;
    }

    .post {
        background: #111;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        border: 1px solid #222;
        display: flex;
        gap: 12px;
        align-items: flex-start;
    }

    .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .post-content {
        flex: 1;
    }

    .author {
        font-weight: bold;
        margin-bottom: 5px;
    }

    .time {
        opacity: 0.5;
        font-size: 13px;
        margin-top: 5px;
    }
</style>
</head>

<body>
<div class="container">

    <h2>Najd Threads</h2>

    <div class="input-box">
        <label>اسم المستخدم:</label>
        <input id="authorInput" type="text" placeholder="اكتب اسمك هنا">

        <label style="margin-top:15px;">اختر لون الدائرة:</label>
        <input id="colorInput" type="color" value="#ff6b00">

        <label style="margin-top:15px;">المحتوى:</label>
        <textarea id="contentInput" rows="3" placeholder="اكتب منشورك..."></textarea>

        <button onclick="addPost()">نشر</button>
    </div>

    <div id="posts"></div>

</div>

<script>
const supabase = supabase.createClient(
    "https://yiwgqohertsftgnpcqoh.supabase.co",
    "sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX"
);

// إضافة منشور
async function addPost() {
    const author = document.getElementById("authorInput").value.trim();
    const color = document.getElementById("colorInput").value;
    const content = document.getElementById("contentInput").value.trim();

    if (!author || !content) {
        alert("الرجاء كتابة الاسم والمحتوى");
        return;
    }

    await supabase.from("posts").insert([
        { author, color, content }
    ]);

    document.getElementById("contentInput").value = "";
}

// تحميل المنشورات
async function loadPosts() {
    const { data } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: true });

    displayPosts(data);
}

// عرض المنشورات
function displayPosts(posts) {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    const now = Date.now();

    posts.forEach(post => {
        const postTime = new Date(post.created_at).getTime();
        const diff = now - postTime;

        // حذف المنشورات بعد 24 ساعة
        if (diff > 24 * 60 * 60 * 1000) {
            supabase.from("posts").delete().eq("id", post.id);
            return;
        }

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <div class="avatar" style="background:${post.color || '#ff6b00'}"></div>
            <div class="post-content">
                <div class="author">${post.author || "مستخدم"}</div>
                <div>${post.content}</div>
                <div class="time">${new Date(post.created_at).toLocaleString()}</div>
            </div>
        `;

        container.appendChild(div);
    });
}

// Realtime
supabase.channel("realtime:posts")
    .on("postgres_changes", { event: "*", schema: "public", table: "posts" }, loadPosts)
    .subscribe();

loadPosts();
</script>

</body>
</html>
