<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najd | نـجـد</title>

    <!-- استدعاء خط Cairo Play -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo+Play:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Cairo Play", sans-serif;
            font-weight: 400;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        /* العنوان */
        header {
            text-align: center;
            padding: 25px 0;
            font-size: 28px;
            font-weight: 700;
            color: #1DB954;
            border-bottom: 1px solid #222;
        }

        /* الحاوية */
        .container {
            width: 100%;
            max-width: 550px;
            margin: auto;
            padding: 20px;
        }

        /* المنشورات */
        .post {
            background: #111;
            border: 1px solid #222;
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 18px;
            transition: 0.2s;
        }

        .post:hover {
            background: #151515;
            transform: translateY(-2px);
        }

        .post-time {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .post-content {
            font-size: 18px;
            line-height: 1.7;
            white-space: pre-wrap;
            font-weight: 400;
        }

        /* زر النشر العائم في وسط أسفل الشاشة بدون left:50% */
        .fab {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            margin: 0 auto;
            background: #1DB954;
            color: #000;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 34px;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px #1db95480;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:hover {
            background: #17a446;
        }

        /* نافذة الكتابة */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000cc;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #111;
            width: 90%;
            max-width: 450px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #222;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 17px;
            resize: none;
            font-family: "Cairo Play", sans-serif;
        }

        .send-btn {
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            background: #1DB954;
            border: none;
            border-radius: 10px;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            color: #000;
        }

        .send-btn:hover {
            background: #17a446;
        }
    </style>
</head>

<body>

    <header>Najd | نـجـد</header>

    <div class="container">
        <div id="feed">
            <p style="text-align:center;color:#666;">جاري تحميل المحتوى...</p>
        </div>
    </div>

    <!-- زر النشر العائم في المنتصف -->
    <button class="fab" onclick="openModal()">+</button>

    <!-- نافذة الكتابة -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <textarea id="postInput" placeholder="اكتب الي بخاطرك..."></textarea>
            <button class="send-btn" onclick="sendPost()">نشر</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://yiwgqohertsftgnpcqoh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function openModal() {
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        // جلب المنشورات (الأقدم فوق + حذف اللي تعدت 24 ساعة)
        async function getPosts() {
            const { data, error } = await _supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) return console.error(error);

            const now = Date.now();
            const feed = document.getElementById("feed");
            feed.innerHTML = "";

            data.forEach(async post => {
                const postTime = new Date(post.created_at).getTime();
                const hoursPassed = (now - postTime) / (1000 * 60 * 60);

                if (hoursPassed >= 24) {
                    await _supabase.from('posts').delete().eq('id', post.id);
                    return;
                }

                const el = document.createElement("div");
                el.className = "post";
                el.innerHTML = `
                    <div class="post-time">${new Date(post.created_at).toLocaleString('ar-SA')}</div>
                    <div class="post-content">${post.content}</div>
                `;
                feed.appendChild(el);
            });
        }

        async function sendPost() {
            const content = document.getElementById("postInput").value;

            if (!content.trim()) {
                alert("اكتب شي أول!");
                return;
            }

            const { error } = await _supabase
                .from('posts')
                .insert([{ content }]);

            if (error) {
                alert("خطأ في النشر");
                return;
            }

            document.getElementById("postInput").value = "";
            closeModal();
            getPosts();
        }

        getPosts();
    </script>

</body>
</html>
